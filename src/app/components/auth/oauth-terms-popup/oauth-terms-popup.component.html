<div class="popup-overlay fade-in">
  <div class="popup-card scale-in">
    <div class="header-section text-center mb-6">
      <div class="icon-circle mb-4">
        <i class="fas fa-file-signature"></i>
      </div>
      <h2 class="text-2xl font-bold mb-2">Casi hemos terminado</h2>
      <p class="text-muted text-sm">
        Para finalizar tu registro, es necesario que elijas cómo usarás Nexus y aceptes nuestras
        condiciones.
      </p>
    </div>

    @if (errorMessage()) {
      <div class="banner error mb-6">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="termsForm" (ngSubmit)="onSubmit()">
      <div class="account-type-section mb-6">
        <h3 class="section-title mb-3">¿Cómo usarás Nexus?</h3>

        <div class="type-cards-grid">
          <div
            class="type-card"
            [class.active-personal]="termsForm.get('tipoCuenta')?.value === 'USUARIO'"
            (click)="termsForm.patchValue({ tipoCuenta: 'USUARIO' })"
          >
            <div class="card-icon">
              <i class="fas fa-user"></i>
            </div>
            <p class="font-bold">Personal</p>
          </div>

          <div
            class="type-card"
            [class.active-empresa]="termsForm.get('tipoCuenta')?.value === 'EMPRESA'"
            (click)="termsForm.patchValue({ tipoCuenta: 'EMPRESA' })"
          >
            <div class="card-icon">
              <i class="fas fa-building"></i>
            </div>
            <p class="font-bold">Empresa</p>
          </div>
        </div>
      </div>

      <div class="legal-section mb-6">
        <label class="custom-checkbox mb-4">
          <input type="checkbox" formControlName="terminosAceptados" />
          <span class="checkmark"></span>
          <span class="label-text">
            He leído y acepto las
            <a routerLink="/legal/terminos" target="_blank">Condiciones de uso</a> y la
            <a routerLink="/legal/privacidad" target="_blank">Política de privacidad</a>.
            <span class="text-red">*</span>
          </span>
        </label>

        <label class="custom-checkbox">
          <input type="checkbox" formControlName="newsletterSuscrito" />
          <span class="checkmark"></span>
          <span class="label-text">
            Quiero recibir comunicaciones sobre promociones y novedades de Nexus.
          </span>
        </label>
      </div>

      <button
        type="submit"
        class="btn-primary w-full"
        [disabled]="termsForm.invalid || isLoading()"
      >
        @if (!isLoading()) {
          <span>Completar Registro</span>
        } @else {
          <i class="fas fa-spinner fa-spin"></i> Guardando...
        }
      </button>
    </form>
  </div>
</div>
