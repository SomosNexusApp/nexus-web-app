<ng-container>
  <header class="nexus-header">
    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="container top-content">
        <a routerLink="/" class="brand-link">
          <img src="logo.webp" alt="Nexus" class="brand-logo" />
        </a>

        <div class="search-wrapper">
          <div class="search-box">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              [formControl]="searchControl"
              placeholder="Buscar en Nexus..."
              class="search-input"
            />
            <button
              class="icon-btn-sm"
              [style.display]="searchControl.value ? 'flex' : 'none'"
              (click)="limpiarBuscador()"
              aria-label="Limpiar"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="actions-wrapper">
          <button class="icon-btn" aria-label="Favoritos" (click)="onFavoritosClick()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="heart-icon"
            >
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              ></path>
            </svg>
          </button>

          <button class="icon-btn relative" aria-label="Notificaciones">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span
              class="notification-badge badge-pop"
              [style.display]="notifCount() > 0 ? 'flex' : 'none'"
            >
              {{ notifCount() > 99 ? '99+' : notifCount() }}
            </span>
          </button>

          <button
            class="icon-btn relative"
            aria-label="Mensajes"
            routerLink="/mensajes"
            [style.display]="isLoggedIn() ? 'flex' : 'none'"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              ></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </button>

          <div class="divider-v"></div>

          <button class="btn-publish-premium" (click)="onPublicarClick()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>Publicar</span>
          </button>

          <div class="auth-section">
            <!-- LOGUEADO -->
            <div class="user-menu-wrapper" [style.display]="isLoggedIn() ? 'block' : 'none'">
              <button class="user-avatar-btn" (click)="toggleUserDropdown($event)">
                <img
                  class="avatar-img"
                  [src]="usuario()?.avatar"
                  alt="Perfil"
                  [style.display]="usuario()?.avatar ? 'block' : 'none'"
                />
                <div
                  class="avatar-placeholder"
                  [style.display]="usuario()?.avatar ? 'none' : 'flex'"
                >
                  {{ getIniciales(usuario()?.nombre, usuario()?.apellidos) }}
                </div>
              </button>

              <div
                class="dropdown-menu fade-in-up"
                [style.display]="isUserDropdownOpen() ? 'block' : 'none'"
              >
                <!-- ↓ span en vez de p — evita el auto-cierre del parser -->
                <div class="dropdown-header">
                  <span class="user-name">{{ usuario()?.nombre }} {{ usuario()?.apellidos }}</span>
                  <span class="user-username text-muted text-sm">@{{ usuario()?.user }}</span>
                  <span class="user-email">{{ usuario()?.email }}</span>
                </div>

                <a routerLink="/configuracion" class="dropdown-item">
                  <i class="fas fa-user-cog"></i> Mi cuenta
                </a>
                <a routerLink="/perfil" [queryParams]="{ tab: 'productos' }" class="dropdown-item">
                  <i class="fas fa-box-open"></i> Mis anuncios
                </a>
                <a routerLink="/perfil" [queryParams]="{ tab: 'favoritos' }" class="dropdown-item">
                  <i class="fas fa-heart"></i> Mis favoritos
                </a>
                <a routerLink="/mensajes" class="dropdown-item">
                  <i class="fas fa-envelope"></i> Mis mensajes
                </a>
                <a routerLink="/perfil" [queryParams]="{ tab: 'compras' }" class="dropdown-item">
                  <i class="fas fa-truck"></i> Mis envíos
                </a>

                <div class="dropdown-divider"></div>

                <a
                  routerLink="/configuracion"
                  fragment="cuenta"
                  class="dropdown-item"
                  *ngIf="!usuario()?.rol?.includes('ROLE_EMPRESA')"
                >
                  <i class="fas fa-briefcase"></i> ¿Eres profesional?
                </a>
                <a routerLink="/ayuda" class="dropdown-item">
                  <i class="fas fa-question-circle"></i> Ayuda
                </a>

                <!-- ↓ div en vez de hr — hr también desincroniza el parser -->
                <div class="dropdown-divider"></div>

                <button (click)="logout()" class="dropdown-item logout-btn">
                  <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </button>
              </div>
            </div>

            <!-- INVITADO -->
            <div class="guest-buttons" [style.display]="isLoggedIn() ? 'none' : 'flex'">
              <a routerLink="/login" class="btn-text">Iniciar Sesión</a>
              <a routerLink="/register" class="btn-register-soft">Registrarse</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
      <div class="container bottom-content">
        <nav class="main-nav">
          <!-- Categorías -->
          <button
            class="nav-item"
            [class.active]="isCategoriasPanelOpen()"
            (click)="toggleCategoriasPanel()"
            type="button"
          >
            <svg
              class="nav-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>{{ navLinks[0].label }}</span>
          </button>

          <!-- Ofertas Flash -->
          <a
            [routerLink]="navLinks[1].route"
            class="nav-item"
            [class.active]="isNavActive(navLinks[1])"
          >
            <svg
              class="nav-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            <span>{{ navLinks[1].label }}</span>
          </a>

          <!-- Vehículos -->
          <a
            [routerLink]="navLinks[2].route"
            [queryParams]="navLinks[2].queryParams"
            class="nav-item"
            [class.active]="isNavActive(navLinks[2])"
          >
            <svg
              class="nav-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9C2.1 11.6 2 12.2 2 12.8V16c0 .6.4 1 1 1h2"
              ></path>
              <circle cx="7" cy="17" r="2"></circle>
              <circle cx="17" cy="17" r="2"></circle>
            </svg>
            <span>{{ navLinks[2].label }}</span>
          </a>

          <!-- Cerca de ti -->
          <a
            [routerLink]="navLinks[3].route"
            class="nav-item"
            [class.active]="isNavActive(navLinks[3])"
          >
            <svg
              class="nav-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span>{{ navLinks[3].label }}</span>
          </a>
        </nav>
      </div>
    </div>
  </header>

  <app-categoria-panel
    [isOpen]="isCategoriasPanelOpen()"
    (cerrar)="toggleCategoriasPanel()"
  ></app-categoria-panel>
</ng-container>
