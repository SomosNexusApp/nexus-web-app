<div class="chat-input-wrapper" [class.recording]="isRecording()">
  <input
    type="file"
    #fileInput
    accept="image/png, image/jpeg, image/webp"
    style="display: none"
    (change)="onFileSelected($event)"
  />

  <!-- Botones de Accesorios -->
  <button
    type="button"
    class="btn-icon"
    (click)="abrirSelectorImagen()"
    title="Adjuntar Imagen"
    [disabled]="isRecording()"
  >
    <i class="fas fa-image"></i>
  </button>

  @if (!esDirecto) {
    <button
      type="button"
      class="btn-icon text-nexus-primary"
      title="Enviar Contrato / Oferta"
      (click)="toggleOfertaModal()"
      [disabled]="isRecording()"
    >
      <i class="fas fa-handshake"></i>
    </button>
  }

  <button
    type="button"
    class="btn-icon"
    title="Buscar GIFs"
    (click)="toggleGifs()"
    [disabled]="isRecording()"
  >
    <i class="fas fa-sticky-note text-yellow-500"></i>
  </button>

  <!-- Area de Texto o Indicador de Grabación -->
  <div class="input-container">
    @if (!isRecording()) {
      <textarea
        #textArea
        placeholder="Escribe un mensaje..."
        [ngModel]="texto()"
        (ngModelChange)="texto.set($event)"
        (input)="onInput()"
        (keydown.enter)="enviarTexto(); $event.preventDefault()"
        rows="1"
      >
      </textarea>
    } @else {
      <div class="recording-indicator">
        <i class="fas fa-circle text-red-500 fa-pulse mr-2"></i> Grabando audio... Selta para enviar
        (Max 60s)
      </div>
    }
  </div>

  <!-- Botones de Acción (Enviar / Grabar Audio) -->
  @if (texto().trim().length > 0 && !isRecording()) {
    <button type="button" class="btn-send text-nexus-primary" (click)="enviarTexto()">
      <i class="fas fa-paper-plane text-xl"></i>
    </button>
  } @else {
    <button
      type="button"
      class="btn-mic"
      (mousedown)="iniciarGrabacion()"
      (touchstart)="iniciarGrabacion()"
      (mouseup)="detenerGrabacion()"
      (mouseleave)="detenerGrabacion()"
      (touchend)="detenerGrabacion()"
    >
      <i
        class="fas"
        [ngClass]="isRecording() ? 'fa-stop-circle text-red-500' : 'fa-microphone text-gray-500'"
      ></i>
    </button>
  }
</div>

<!-- GIF Tracker Overlay -->
@if (mostrarGifs()) {
  <div class="gifs-overlay">
    <div class="gifs-header">
      <input
        type="text"
        [ngModel]="gifSearch()"
        (ngModelChange)="gifSearch.set($event)"
        (keydown.enter)="buscarGifs()"
        placeholder="Buscar GIFs en Tenor..."
        class="form-input gif-search-input"
        autofocus
      />
      <button class="btn-icon" (click)="buscarGifs()"><i class="fas fa-search"></i></button>
      <button class="btn-icon ml-auto" (click)="toggleGifs()"><i class="fas fa-times"></i></button>
    </div>

    <div class="gifs-grid">
      @for (gif of gifs(); track gif.id) {
        <img
          [src]="gif.media[0]?.tinygif?.url || gif.media[0]?.gif?.url"
          class="gif-item"
          (click)="seleccionarGif(gif)"
        />
      } @empty {
        <p class="text-center w-full text-slate-400 p-4">No se encontraron resultados</p>
      }
    </div>
  </div>
}
