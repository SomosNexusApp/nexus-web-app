<div class="popup-overlay fade-in" (click)="onBackdropClick($event)">
    <div class="popup-card scale-in" [class.mobile-sheet]="isMobile()">
        <div class="sheet-handle" *ngIf="isMobile()"></div>
        <button class="btn-close" (click)="guestPopup.hidePopup()" aria-label="Cerrar">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="text-center mb-6">
            <img src="logo.webp" alt="Nexus Logo" class="brand-logo mb-4" />
            <h2 class="text-xl font-bold">{{ tituloDinamico }}</h2>
        </div>

        <div class="benefits-container mb-6" *ngIf="!isMobile()">
            <div class="benefit-item">
                <div class="benefit-icon blue">
                    <i class="fas fa-comments"></i>
                </div>
                <p>Chatea en tiempo real con vendedores y compradores.</p>
            </div>
            <div class="benefit-item">
                <div class="benefit-icon purple">
                    <i class="fas fa-bolt"></i>
                </div>
                <p>Vota en chollos y ayuda a la comunidad.</p>
            </div>
            <div class="benefit-item">
                <div class="benefit-icon pink">
                    <i class="fas fa-heart"></i>
                </div>
                <p>Guarda favoritos y recibe alertas de precio.</p>
            </div>
        </div>

        <div class="actions-stack">
            <button class="btn-primary" (click)="navegarA('/register')">
                <i class="fas fa-user-plus"></i> Regístrate gratis
            </button>

            <div id="google-popup-btn-container" class="w-full"></div>

            <div class="divider"><span>o</span></div>

            <button class="btn-secondary" (click)="navegarA('/login')">
                <i class="fas fa-sign-in-alt"></i> Ya tengo cuenta, Entrar
            </button>
        </div>

        <div class="text-center mt-6">
            <button class="btn-skip" (click)="guestPopup.hidePopup()">
                Puedes seguir explorando sin cuenta
            </button>
        </div>
    </div>
</div>
