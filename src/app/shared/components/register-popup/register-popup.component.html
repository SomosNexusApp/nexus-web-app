<div class="popup-overlay fade-in" (click)="onBackdropClick($event)">
  <div class="popup-card scale-in">
    <button class="btn-close" (click)="guestPopup.hidePopup()" aria-label="Cerrar">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div class="text-center mb-6">
      <img src="logo.webp" alt="Nexus Logo" class="brand-logo mb-4" />
      <h2 class="text-xl font-bold">{{ tituloDinamico }}</h2>
    </div>

    <div class="benefits-container mb-6">
      <div class="benefit-item">
        <div class="benefit-icon blue">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <p>Chatea en tiempo real con vendedores y compradores.</p>
      </div>

      <div class="benefit-item">
        <div class="benefit-icon purple">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
        </div>
        <p>Vota en chollos y ayuda a la comunidad.</p>
      </div>

      <div class="benefit-item">
        <div class="benefit-icon pink">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12 21l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.18L12 21z"
            ></path>
          </svg>
        </div>
        <p>Guarda favoritos y recibe alertas de precio.</p>
      </div>
    </div>

    <div class="actions-stack">
      <button class="btn-primary" (click)="navegarA('/register')">Regístrate gratis</button>

      <button class="btn-google" (click)="loginConGoogle()">
        <img src="assets/icons/google.svg" alt="" width="18" />
        Continuar con Google
      </button>

      <div class="divider">
        <span>o</span>
      </div>

      <button class="btn-secondary" (click)="navegarA('/login')">Ya tengo cuenta, Entrar</button>
    </div>

    <div class="text-center mt-6">
      <button class="btn-skip" (click)="guestPopup.hidePopup()">
        Puedes seguir explorando sin cuenta
      </button>
    </div>
  </div>
</div>
